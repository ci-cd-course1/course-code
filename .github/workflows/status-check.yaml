name: Status Check Functions
on: [push]

jobs:
    job-1:
        runs-on: ubuntu-latest
        steps:
            - name: Step 1
              run: sleep 20
            - name: Runs on Failure
              if: failure()
              run: echo 'Runs only on failure'
            - name: Run on Success
            #This is not needed because it's default behaivour
              if: success()
              run: echo 'Runs on Success'
            - name: Always Runs
            #   if: success() || failure()
              if: always()
              run: echo 'Always runs'
            - name: Runs when Cancelled
              if: cancelled()
              run: echo 'Runs when Cancelled'
    job-2:
        runs-on: ubuntu-latest
        needs: job-1
        if: failure()
        steps:
            - run: echo 'Job 2'